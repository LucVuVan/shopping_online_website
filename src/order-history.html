<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng - FashionStore</title>
    <link rel="stylesheet" href="assets/css/base/variables.css">
    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="stylesheet" href="assets/css/base/typography.css">
    <link rel="stylesheet" href="assets/css/components/navbar.css">
    <link rel="stylesheet" href="assets/css/components/footer.css">
    <link rel="stylesheet" href="assets/css/pages/order-history.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="back-bar">
    <a href="index.html" class="back-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="m15 18-6-6 6-6"/>
        </svg>
        Quay lại trang chủ
    </a>
</div>

<div class="account-layout">
    <aside class="account-sidebar">
        <div class="user-info">
            <div class="user-avatar">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div>
                <div class="user-name" id="userName">Nguyễn Văn A</div>
                <div class="user-email" id="userEmail">user@example.com</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="profile.html" class="sidebar-nav-item">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Hồ sơ
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
            </a>
            <a href="order-history.html" class="sidebar-nav-item active">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                Đơn mua
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
            </a>
            <a href="#" class="sidebar-nav-item logout" id="logoutBtn">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Đăng xuất
                <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
            </a>
        </nav>
    </aside>

    <main class="account-content">
        <div class="content-header">
            <h1>Lịch sử đơn hàng</h1>
            <p>Quản lý và theo dõi các đơn hàng của bạn</p>
        </div>
        <div class="order-tabs">
            <button class="tab-btn active" data-status="all">Tất cả</button>
            <button class="tab-btn" data-status="pending">Chờ xác nhận</button>
            <button class="tab-btn" data-status="shipping">Đang giao</button>
            <button class="tab-btn" data-status="completed">Hoàn thành</button>
            <button class="tab-btn" data-status="cancelled">Đã hủy</button>
        </div>
        <div class="order-list" id="orderList"></div>
    </main>
</div>

<div id="footer-placeholder"></div>

<script src="assets/js/components.js"></script>
<script src="assets/js/auth/auth.js"></script>
<script src="assets/js/order-history.js"></script>
</body>
</html>
