<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionStore - Thời trang chất lượng cao</title>
    <link rel="stylesheet" href="assets/css/base/variables.css">
    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="stylesheet" href="assets/css/base/typography.css">
    <link rel="stylesheet" href="assets/css/layouts/main-layout.css">
    <link rel="stylesheet" href="assets/css/components/navbar.css">
    <link rel="stylesheet" href="assets/css/components/product-card.css">
    <link rel="stylesheet" href="assets/css/components/footer.css">
    <link rel="stylesheet" href="assets/css/pages/home.css">
    <link rel="stylesheet" href="assets/css/components/cart.css">
    <link rel="stylesheet" href="assets/css/components/product-modal.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<section class="hero">
    <div class="hero-banner">
        <h1>Bộ sưu tập mùa đông 2026</h1>
        <p>Giảm giá lên đến 50% cho tất cả sản phẩm</p>
        <a href="#products" class="btn-hero">Mua ngay</a>
    </div>
</section>

<div class="main-content" id="products">
    <aside class="sidebar">
        <h3>Bộ lọc</h3>
        <div class="filter-section filter-category">
            <h4>Danh mục</h4>
            <div class="checkbox-list">
                <label class="checkbox-item"><input type="checkbox" data-category="Áo thun"><span>Áo thun</span></label>
                <label class="checkbox-item"><input type="checkbox" data-category="Áo khoác"><span>Áo khoác</span></label>
                <label class="checkbox-item"><input type="checkbox" data-category="Quần jean"><span>Quần jean</span></label>
                <label class="checkbox-item"><input type="checkbox" data-category="Váy"><span>Váy</span></label>
                <label class="checkbox-item"><input type="checkbox" data-category="Giày"><span>Giày</span></label>
                <label class="checkbox-item"><input type="checkbox" data-category="Phụ kiện"><span>Phụ kiện</span></label>
            </div>
        </div>
        <div class="filter-section">
            <h4>Khoảng giá</h4>
            <input type="range" min="0" max="2000000" value="2000000" id="priceRange">
            <div class="price-range-values">
                <span>0đ</span>
                <span id="priceVal">2.000.000đ</span>
            </div>
        </div>
        <div class="filter-section filter-size">
            <h4>Kích thước</h4>
            <div class="checkbox-list">
                <label class="checkbox-item"><input type="checkbox" data-size="S"><span>S</span></label>
                <label class="checkbox-item"><input type="checkbox" data-size="M"><span>M</span></label>
                <label class="checkbox-item"><input type="checkbox" data-size="L"><span>L</span></label>
                <label class="checkbox-item"><input type="checkbox" data-size="XL"><span>XL</span></label>
                <label class="checkbox-item"><input type="checkbox" data-size="XXL"><span>XXL</span></label>
            </div>
        </div>
    </aside>

    <section class="products-section">
        <h2 id="productCount">Tất cả sản phẩm (8)</h2>
        <div class="product-grid" id="productGrid">
                <!-- Sản phẩm render bởi home.js -->
            </div>
    </section>
</div>

<div id="footer-placeholder"></div>

<script src="assets/js/components.js"></script>
<script src="assets/js/auth/auth.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/product-modal.js"></script>
<script src="assets/js/home.js"></script>
</body>
</html>
