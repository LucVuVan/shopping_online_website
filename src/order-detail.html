<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng - FashionStore</title>
    <link rel="stylesheet" href="assets/css/base/variables.css">
    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="stylesheet" href="assets/css/base/typography.css">
    <link rel="stylesheet" href="assets/css/components/navbar.css">
    <link rel="stylesheet" href="assets/css/components/footer.css">
    <link rel="stylesheet" href="assets/css/pages/order-detail.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="back-bar">
    <a href="order-history.html" class="back-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="m15 18-6-6 6-6"/>
        </svg>
        Quay lại danh sách
    </a>
</div>

<div class="order-detail-wrap">

    <!-- HEADER -->
    <div class="od-header">
        <div>
            <h1 id="orderId"></h1>
            <p id="orderDate"></p>
        </div>
        <span class="order-status" id="orderStatus"></span>
    </div>

    <div class="od-divider"></div>

    <!-- TRACKING -->
    <div class="od-section">
        <h2>Trạng thái đơn hàng</h2>
        <div class="tracking-timeline" id="trackingTimeline">
            <div class="timeline-line"></div>
            <div class="timeline-step">
                <div class="step-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
                    </svg>
                </div>
                <span>Đặt hàng</span>
            </div>
            <div class="timeline-step">
                <div class="step-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    </svg>
                </div>
                <span>Đang xử lý</span>
            </div>
            <div class="timeline-step">
                <div class="step-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/>
                        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
                    </svg>
                </div>
                <span>Đang giao hàng</span>
            </div>
            <div class="timeline-step">
                <div class="step-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <span>Giao thành công</span>
            </div>
        </div>
    </div>

    <div class="od-divider"></div>

    <!-- ADDRESS + PAYMENT -->
    <div class="od-two-col">
        <div class="od-section">
            <h2>Địa chỉ nhận hàng</h2>
            <div class="address-card">
                <div class="address-name" id="addrName"></div>
                <div class="address-phone" id="addrPhone"></div>
                <div class="address-text" id="addrText"></div>
            </div>
        </div>
        <div class="od-section">
            <h2>Thông tin thanh toán</h2>
            <div class="payment-info">
                <div class="payment-row">
                    <span>Phương thức:</span>
                    <strong id="payMethod"></strong>
                </div>
                <div class="payment-row">
                    <span>Trạng thái:</span>
                    <span class="pay-status" id="payStatus"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="od-divider"></div>

    <!-- PRODUCTS TABLE -->
    <div class="od-section">
        <h2>Sản phẩm đã đặt</h2>
        <div class="products-table">
            <div class="table-head">
                <span class="col-product">Sản phẩm</span>
                <span class="col-variant">Phân loại</span>
                <span class="col-qty">Số lượng</span>
                <span class="col-price">Giá tiền</span>
            </div>
            <div id="productRows"></div>
        </div>
        <div class="order-totals">
            <div class="total-row"><span>Tạm tính</span><span id="subtotal"></span></div>
            <div class="total-row"><span>Phí vận chuyển</span><span id="shipping"></span></div>
            <div class="total-row grand"><span>Tổng cộng</span><strong id="grandTotal"></strong></div>
        </div>
    </div>

    <div class="od-divider"></div>

    <!-- ACTIONS -->
    <div class="od-actions">
        <button class="btn-rebuy" id="btnRebuy">Mua lại</button>
        <button class="btn-review" id="btnReview">Đánh giá sản phẩm</button>
    </div>

</div>

<div id="footer-placeholder"></div>

<script src="assets/js/components.js"></script>
<script src="assets/js/auth/auth.js"></script>
<script src="assets/js/order-detail.js"></script>
</body>
</html>
